<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$BROKE Launch Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .logo-bg {
            position: absolute;
            font-size: 15vw;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            z-index: 0;
            pointer-events: none;
        }

        .frog-container {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        .frog {
            width: 200px;
            height: auto;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            min-width: 100px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .time-value {
            font-size: 3rem;
            font-weight: bold;
            display: block;
        }

        .time-label {
            font-size: 1rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .platform {
            margin-top: 30px;
            font-size: 1.5rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .rocket {
            font-size: 3rem;
            animation: fly 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes fly {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -10px) rotate(5deg); }
            75% { transform: translate(-10px, 10px) rotate(-5deg); }
        }

        .hashtag {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .time-value { font-size: 2rem; }
            .time-box { padding: 15px 20px; min-width: 70px; }
            .logo-bg { font-size: 20vw; }
        }
    </style>
</head>
<body>
    <div class="logo-bg">$BROKE</div>
    
    <div class="container">
        <div class="frog-container">
            <!-- Ganti src dengan URL gambar frog kamu -->
            <img src="https://i.imgur.com/YOUR_FROG_IMAGE.png" alt="Ninja Frog" class="frog">
        </div>

        <h1>$BROKE</h1>

        <div class="countdown" id="countdown">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <div class="platform">
            🚀 Launching on Phantom
        </div>

        <div class="hashtag">
            #BROKE #Solana #Memecoin
        </div>
    </div>

        <script>
        // GANTI TANGGAL LAUNCH DI SINI
        // Format: "Bulan Tanggal, Tahun Jam:Menit:Detik"
       const launchDate = new Date("May 22, 2026 08:00:00 UTC");

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<h2 style="font-size:3rem; margin-top:20px;"> LAUNCHED! 🚀</h2>';
                document.getElementById('countdown').style.display = 'block';
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
